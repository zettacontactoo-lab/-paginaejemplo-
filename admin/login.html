<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acceso administrador</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="admin.css">
</head>
<body class="login-body">
  <div class="login-box">
    <h1>Panel administrador</h1>
    <p class="sub">Acceso exclusivo</p>
    <form id="loginForm">
      <label>Usuario<input type="text" name="usuario" required autofocus></label>
      <label>Contraseña<input type="password" name="clave" required></label>
      <p id="loginError" class="error"></p>
      <button type="submit" class="btn-primary">Entrar</button>
    </form>
  </div>
<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const fd = new FormData(e.target);
  const payload = Object.fromEntries(fd.entries());
  const res = await fetch('/api/admin/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  });
  if (res.ok) {
    window.location.href = '/admin/panel';
  } else {
    document.getElementById('loginError').textContent = 'Usuario o contraseña incorrectos.';
  }
});
</script>
</body>
</html>
